<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <!-- Apply saved/system theme before first paint to avoid a flash -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem("habits.theme");
        if (t === "light") t = "pink";
        if (t === "dark") t = "carbon";
        if (!t) t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "carbon" : "pink";
        document.documentElement.dataset.theme = t;
      } catch (e) { document.documentElement.dataset.theme = "pink"; }
    })();
  </script>
  <title>습관 트래커</title>
  <meta name="description" content="매일의 습관을 체크하고 연속 달성 기록을 쌓아보세요." />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#6366f1" />

  <!-- iOS standalone web app -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="습관" />
  <link rel="apple-touch-icon" href="./icons/icon-180.png" />
  <link rel="icon" type="image/png" href="./icons/icon-192.png" />

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="check-top">
        <span class="wordmark">Habit Check</span>
        <span class="check-top-right">
          <button id="themeBtn" class="icon-btn" aria-label="테마 고르기">🎨</button>
          <span class="serial" id="serial">№ 0000</span>
        </span>
      </div>
      <div class="check-row">
        <div class="check-field">
          <span class="check-lbl">Date</span>
          <span id="todayLabel" class="check-val"></span>
        </div>
        <div class="check-field">
          <span class="check-lbl">Sheet</span>
          <span id="screenTitle" class="check-val">오늘의 습관</span>
        </div>
        <div class="check-ring">
          <div class="progress-ring" id="progressRing" aria-hidden="true">
            <span id="progressText">0/0</span>
          </div>
        </div>
      </div>
    </header>

    <!-- tabs -->
    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="calendar">캘린더</button>
      <button class="tab" data-tab="today">오늘</button>
      <button class="tab" data-tab="stats">통계</button>
      <button class="tab" data-tab="vault">금고</button>
    </nav>

    <!-- calendar (home) -->
    <main id="calendarView"></main>

    <!-- today -->
    <main id="todayView" hidden>
      <div id="list" class="list"></div>
      <p id="empty" class="empty" hidden>
        아직 습관이 없어요.<br />아래 <b>+ 버튼</b>으로 첫 습관을 추가해 보세요.
      </p>
      <p id="reorderHint" class="hint" hidden>습관을 탭해서 들어가면 ▲▼ 버튼으로 순서를 바꿀 수 있어요.</p>
      <p class="thankyou">Thank You ♡</p>
    </main>

    <!-- stats -->
    <main id="statsView" hidden></main>

    <!-- vault (gamification) -->
    <main id="vaultView" hidden></main>

    <button id="addBtn" class="fab" aria-label="습관 추가">+</button>
  </div>

  <!-- Floating coin reward layer -->
  <div id="coinLayer"></div>

  <!-- Day detail sheet (from calendar) -->
  <div id="daySheet" class="sheet-backdrop" hidden></div>

  <!-- Theme picker sheet -->
  <div id="themeSheet" class="sheet-backdrop" hidden></div>

  <!-- Habit detail (full screen) -->
  <div id="detail" class="detail" hidden></div>

  <!-- Add / edit sheet -->
  <div id="sheet" class="sheet-backdrop" hidden>
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
      <h2 id="sheetTitle">습관 추가</h2>
      <label class="field">
        <span>아이콘</span>
        <div id="emojiRow" class="emoji-row"></div>
      </label>
      <label class="field">
        <span>이름</span>
        <input id="nameInput" type="text" maxlength="24" placeholder="예: 물 2L 마시기" autocomplete="off" />
      </label>
      <label class="field" id="colorField">
        <span>색상</span>
        <div id="colorRow" class="color-row"></div>
      </label>
      <div class="sheet-actions">
        <button id="cancelBtn" class="btn ghost">취소</button>
        <button id="saveBtn" class="btn primary">저장</button>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
